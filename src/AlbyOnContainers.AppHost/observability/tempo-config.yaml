# ============================================
# Tempo — Configuration
# ──────────────────────────────────────────
# Riceve tracce OTLP/gRPC dal Collector.
# Storage locale su filesystem.
# ============================================

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

metrics_generator:
  storage:
    path: /var/tempo/metrics
  traces_storage:
    path: /var/tempo/traces
