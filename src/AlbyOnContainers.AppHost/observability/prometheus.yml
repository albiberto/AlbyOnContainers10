# ============================================
# Prometheus — Configuration
# ──────────────────────────────────────────
# Riceve metriche via Remote Write dal Collector.
# Self-scrape abilitato per monitorare Prometheus stesso.
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Abilita Remote Write Receiver per accettare dati dal Collector
# (flag --web.enable-remote-write-receiver necessario all'avvio)

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
