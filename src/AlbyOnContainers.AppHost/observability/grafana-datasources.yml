- name: Tempo
  type: tempo
  access: proxy
  uid: tempo
  url: http://tempo:3200
  editable: false
  jsonData:
    tracesToLogsV2:
      datasourceUid: loki
      filterByTraceID: true
    tracesToMetrics:
      datasourceUid: prometheus
    nodeGraph:
      enabled: true
    serviceMap:
      datasourceUid: prometheus
    # FIX: search abilitato con backend
    search:
      hide: false
    lokiSearch:
      datasourceUid: loki